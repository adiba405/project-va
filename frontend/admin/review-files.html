<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Review Files | Admin | AI Study Assistant</title>
<link rel="stylesheet" href="../styles.css" />
<link rel="stylesheet" href="admin-styles.css" />
</head>
<body class="admin-page">
<div class="app-container">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="pulse-node" style="width: 12px; height: 12px; background: var(--primary); border-radius: 50%;"></div>
      <span>ADMIN PANEL</span>
    </div>
    <nav class="nav-links sidebar-nav">
      <a href="admin-dashboard.html">Dashboard</a>
      <a href="admin-dashboard.html#users">Users</a>
      <a href="admin-dashboard.html#content" class="active">Content</a>
      <a href="admin-dashboard.html#analytics">Analytics</a>
      <a href="admin-dashboard.html#settings">Settings</a>
      <a href="admin-login.html" id="logout-sidebar">Logout</a>
    </nav>
  </aside>

  <main class="main-content">
    <section class="page-hero admin-hero">
      <p class="auth-kicker">Admin Control Center</p>
      <h1>Review Files</h1>
      <p class="section-intro">This page is wired from Content moderation quick links.</p>
    </section>

    <div class="card admin-section">
      <h3>Moderation UI (placeholder)</h3>
      <p class="section-intro">Backend moderation endpoints are not yet connected. This confirms the quick-link navigation works.</p>
      <div class="admin-action-grid" style="margin-top:1rem;">
        <button class="btn btn-secondary" type="button" onclick="window.location.href='admin-dashboard.html#content'">Back to Content</button>
      </div>
    </div>
  </main>
</div>

<script src="../app.js"></script>
<script>
  requireAuth();
  initDarkMode();
  const logout = document.getElementById('logout-sidebar');
  if (logout) {
    logout.onclick = (e) => {
      e.preventDefault();
      localStorage.removeItem('token');
      localStorage.removeItem('adminUser');
      window.location.href = 'admin-login.html';
    };
  }
</script>
</body>
</html>
