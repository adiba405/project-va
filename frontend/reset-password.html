<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password - AI-STUDY ASSISTANT</title>
<link rel="stylesheet" href="styles.css">
</head>
<body class="auth-page">
<div class="page-shell">
  <div class="page-bg"></div>
  <div class="page-ui">
    <header class="auth-navbar">
      <a class="auth-brand" href="index.html">AI-STUDY ASSISTANT</a>
    </header>

    <main class="auth-grid">
      <section class="auth-main fade-in-right">
        <section class="auth-card glass-card">
          <div class="card-header">
            <div>
              <p class="auth-kicker">Account recovery</p>
              <h2>Reset Password</h2>
            </div>
          </div>

          <p class="card-copy">Create a new password for your student account.</p>

          <div class="form-group">
            <label for="new-password">New Password</label>
            <div class="field-with-icon">
              <span class="field-icon"></span>
              <input id="new-password" class="input-field" placeholder="Enter a new password" type="password" aria-label="New Password" required>
              <button type="button" class="password-toggle" id="new-password-toggle" aria-label="Show password">Show</button>
            </div>
          </div>

          <div class="form-group">
            <label for="confirm-password">Confirm Password</label>
            <div class="field-with-icon">
              <span class="field-icon"></span>
              <input id="confirm-password" class="input-field" placeholder="Confirm your new password" type="password" aria-label="Confirm Password" required>
            </div>
          </div>

          <button class="btn btn-primary" id="reset-password-btn" type="button">Update Password</button>
          <p class="forgot-info"><a class="link-text" href="index.html">Back to login</a></p>
        </section>
      </section>
    </main>
  </div>
</div>

<div id="toast" class="toast" role="status" aria-live="polite"></div>

<script src="app.js"></script>
<script src="neural-bg.js"></script>
<script>
const token = new URLSearchParams(window.location.search).get('token') || '';
const newPasswordInput = document.getElementById('new-password');
const confirmPasswordInput = document.getElementById('confirm-password');
const toggleButton = document.getElementById('new-password-toggle');
const resetButton = document.getElementById('reset-password-btn');

const showToast = (message, type = 'info') => {
  const toast = document.getElementById('toast');
  toast.textContent = message;
  toast.className = `toast toast-${type}`;
  toast.style.opacity = '1';
  setTimeout(() => {
    toast.style.opacity = '0';
  }, 3600);
};

const setResetLoading = (isLoading) => {
  resetButton.disabled = isLoading;
  resetButton.classList.toggle('loading', isLoading);
  resetButton.textContent = isLoading ? 'Updating...' : 'Update Password';
};

toggleButton.onclick = () => {
  const isVisible = newPasswordInput.type === 'text';
  newPasswordInput.type = isVisible ? 'password' : 'text';
  toggleButton.textContent = isVisible ? 'Show' : 'Hide';
};

resetButton.onclick = async () => {
  const newPassword = newPasswordInput.value;
  const confirmPassword = confirmPasswordInput.value;

  if (!token) {
    showToast('This reset link is missing a token.', 'error');
    return;
  }

  if (newPassword.length < 6) {
    showToast('Password must be at least 6 characters.', 'error');
    return;
  }

  if (newPassword !== confirmPassword) {
    showToast('Passwords do not match.', 'error');
    return;
  }

  setResetLoading(true);
  try {
    const result = await apiFetch('/auth/reset-password', 'POST', {
      token,
      new_password: newPassword
    });

    if (!result.success) {
      showToast(result.message || 'Unable to reset password.', 'error');
      return;
    }

    showToast('Password updated. Redirecting to login...', 'success');
    setTimeout(() => {
      window.location.href = 'index.html';
    }, 1400);
  } catch (err) {
    showToast('Network error. Please try again.', 'error');
  } finally {
    setResetLoading(false);
  }
};

[newPasswordInput, confirmPasswordInput].forEach((input) => {
  input.addEventListener('keypress', (event) => {
    if (event.key === 'Enter') {
      resetButton.click();
    }
  });
});
</script>
</body>
</html>
