    <path d="M91 88 L128 66 L165 88 L165 132 L128 154 L91 132 L91 88Z" stroke="url(#brandGrad)" stroke-width="2.6" opacity="0.55"/>

    <path d="M86 68 C103 58 118 54 128 54 C140 54 158 60 170 74 L160 82 C149 70 136 66 128 66 C120 66 106 70 94 78 L86 68Z" fill="url(#sheen)" opacity="0.55"/>

