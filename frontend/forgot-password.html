<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - AI-STUDY ASSISTANT</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="auth-page">
<div class="page-shell">
  <div class="page-bg"></div>
  <div class="page-ui">
    <header class="auth-navbar">
      <a class="auth-brand" href="index.html">AI-STUDY ASSISTANT</a>
    </header>

    <main class="auth-grid">
      <section class="auth-main fade-in-right">
        <section class="auth-card glass-card">
          <div class="card-header">
            <div>
              <p class="auth-kicker">Account recovery</p>
              <h2>Forgot Password</h2>
            </div>
          </div>

          <p class="card-copy">Enter your email address and we will send you a password reset link.</p>

          <div class="form-group">
            <label for="email">Email</label>
            <div class="field-with-icon">
              <span class="field-icon"></span>
              <input id="email" class="input-field" placeholder="Enter your email" type="email" aria-label="Email" required>
            </div>
          </div>

          <button class="btn btn-primary" id="send-reset-link-btn" type="button">Send reset link</button>
          <p class="forgot-info"><a class="link-text" href="login.html">Back to login</a></p>
        </section>
      </section>
    </main>
  </div>
</div>

<div id="toast" class="toast" role="status" aria-live="polite"></div>

<script src="app.js"></script>
<script>
  const sendBtn = document.getElementById('send-reset-link-btn');
  const emailInput = document.getElementById('email');

  const showToast = (message, type = 'info') => {
    const toast = document.getElementById('toast');
    toast.textContent = message;
    toast.className = `toast toast-${type}`;
    toast.style.opacity = '1';
    setTimeout(() => { toast.style.opacity = '0'; }, 3600);
  };

  const setLoading = (isLoading) => {
    sendBtn.disabled = isLoading;
    sendBtn.classList.toggle('loading', isLoading);
    sendBtn.textContent = isLoading ? 'Sending...' : 'Send reset link';
  };

  sendBtn.onclick = async () => {
    const email = (emailInput.value || '').trim().toLowerCase();
    if (!email) {
      showToast('Email is required.', 'error');
      return;
    }

    setLoading(true);
    try {
      const result = await apiFetch('/auth/forgot-password', 'POST', { email });
      if (!result.success) {
        showToast(result.message || 'Unable to send reset email.', 'error');
        return;
      }
      showToast(result.message || 'If your account exists, you will receive a reset email shortly.', 'success');
    } catch (e) {
      showToast('Network error. Please try again.', 'error');
    } finally {
      setLoading(false);
    }
  };

  [emailInput].forEach((input) => {
    input.addEventListener('keypress', (event) => {
      if (event.key === 'Enter') sendBtn.click();
    });
  });
</script>
</body>
</html>
